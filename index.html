<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOXIS - Safe</title>
    <script src="https://cloudflare.com"></script>
    <style>
        :root { --bg: #0a0e27; --card: #11162e; --accent: #00ffcc; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .card { background: var(--card); border: 1px solid var(--accent); border-radius: 15px; padding: 25px; max-width: 400px; margin: 20px auto; box-shadow: 0 0 20px rgba(0,255,204,0.2); }
        input, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--accent); box-sizing: border-box; font-size: 16px; }
        input { background: #1a1f3a; color: var(--accent); }
        button { background: var(--accent); color: #0a0e27; font-weight: bold; cursor: pointer; border: none; }
        button:active { opacity: 0.7; transform: scale(0.98); }
        .hidden { display: none !important; }
        
        /* КОНТРАСТНЫЙ ГЕНЕРАТОР СЛОВ */
        .seed-box { 
            background: #ffffff; /* Белый фон для 100% видимости */
            color: #000000;    /* Черный текст */
            padding: 20px; 
            border-radius: 10px; 
            font-family: monospace; 
            font-weight: bold; 
            font-size: 16px;
            word-break: break-all; 
            margin: 20px 0;
            border: 3px solid var(--accent);
        }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>

    <div id="regScreen" class="card">
        <h1>VOXIS</h1>
        <p style="font-size: 12px; color: #555;">РЕГИСТРАЦИЯ НОВОГО УЗЛА</p>
        <input type="text" id="nick" placeholder="Ваш Никнейм">
        <input type="password" id="p1" placeholder="Придумайте ПИН">
        <input type="password" id="p2" placeholder="Повторите ПИН">
        <button onclick="register()">СОЗДАТЬ СЕЙФ</button>
    </div>

    <div id="app" class="card hidden">
        <h2 style="color: var(--accent);">VOXIS ACTIVE</h2>
        <div style="text-align: left; font-size: 14px;">
            <p>👤 УЗЕЛ: <span id="myNick"></span></p>
            <p>🆔 ID: <span id="myId" style="color: var(--accent);"></span></p>
            <p>💰 БАЛАНС: 100.00 VOX</p>
        </div>
        <hr style="border: 0.5px solid #1a1f3a;">
        <input type="text" id="to" placeholder="ID получателя">
        <button onclick="send()">ОТПРАВИТЬ ПАКЕТ</button>
        <div id="log" style="font-size: 10px; color: #555; margin-top: 10px;"></div>
    </div>

    <!-- ОКНО С СИДОМ -->
    <div id="seedModal" class="modal hidden">
        <div class="card" style="max-width: 90%;">
            <h3 style="color: var(--accent); margin-top: 0;">⚠️ ЗАПИШИТЕ ЭТИ СЛОВА!</h3>
            <p style="font-size: 12px; color: #bbb;">Без них вы потеряете доступ к VOX навсегда.</p>
            <div id="seedOut" class="seed-box"></div>
            <button onclick="closeModal()">Я ЗАПИСАЛ (ВОЙТИ)</button>
        </div>
    </div>

    <script>
        const API = "https://google.com";

        function register() {
            const nick = document.getElementById('nick').value;
            const p1 = document.getElementById('p1').value;
            const p2 = document.getElementById('p2').value;

            if (!nick || !p1) return alert("Заполните все поля!");
            if (p1 !== p2) return alert("ПИН-коды не совпадают!");
            if (p1.length < 4) return alert("ПИН должен быть не менее 4 цифр!");

            // Генерация случайных слов
            const words = ["alpha", "beta", "gamma", "delta", "voxis", "core", "node", "stealth", "crypto", "matrix", "safety", "ultra"];
            const seed = words.sort(() => 0.5 - Math.random()).join(" ");
            
            // Генерация ID
            const id = "VOX-" + CryptoJS.SHA256(seed).toString().substring(0, 8).toUpperCase();

            // Вывод в модалку
            document.getElementById('seedOut').innerText = seed;
            document.getElementById('myNick').innerText = nick;
            document.getElementById('myId').innerText = id;
            
            // Шифрование данных для памяти телефона
            const vault = { nick, id, seed };
            localStorage.setItem('vox_vault', CryptoJS.AES.encrypt(JSON.stringify(vault), p1).toString());

            // Показываем модалку
            document.getElementById('seedModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('seedModal').classList.add('hidden');
            document.getElementById('regScreen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
        }

        async function send() {
            const to = document.getElementById('to').value;
            const log = document.getElementById('log');
            if(!to) return alert("Введите ID получателя");
            
            log.innerText = "> Синхронизация с Маяком...";
            try {
                await fetch(API + "?action=send&token=" + to + "&message=PING_FROM_" + document.getElementById('myId').innerText, {mode: 'no-cors'});
                log.innerText = "> ПАКЕТ УСПЕШНО ОТПРАВЛЕН В ОБЛАКО.";
            } catch (e) {
                log.innerText = "> ОШИБКА СВЯЗИ.";
            }
        }

        // Проверка при загрузке: если уже есть сейф, идем сразу в чат (нужен ПИН, добавим логику входа завтра)
        window.onload = () => {
            if (localStorage.getItem('vox_vault')) {
                console.log("Сейф обнаружен. Ожидание авторизации.");
            }
        };
    </script>
</body>
</html>
