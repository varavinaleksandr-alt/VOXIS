<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOXIS SAFE</title>
    <!-- Библиотека шифрования -->
    <script src="https://cloudflare.com"></script>
    <style>
        :root { --accent: #00ffcc; --bg: #0a0e27; }
        body { background: var(--bg); color: #e0e0e0; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
        .card { background: #11162e; border: 1px solid var(--accent); border-radius: 15px; padding: 25px; max-width: 400px; margin: auto; box-shadow: 0 0 15px rgba(0,255,204,0.2); }
        input, button, textarea { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--accent); background: #1a1f3a; color: var(--accent); font-weight: bold; font-size: 16px; box-sizing: border-box; }
        button { background: var(--accent); color: #0a0e27; cursor: pointer; border: none; text-transform: uppercase; }
        button:active { transform: scale(0.98); opacity: 0.8; }
        .hidden { display: none !important; }
        .seed-box { background: #fff !important; color: #000 !important; padding: 15px; border-radius: 8px; font-family: monospace; font-weight: bold; border: 2px solid var(--accent); word-break: break-all; margin: 10px 0; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>

    <!-- ЭКРАН РЕГИСТРАЦИИ -->
    <div class="card" id="regScreen">
        <h1>VOXIS</h1>
        <input type="text" id="nick" placeholder="Введите Никнейм">
        <input type="password" id="p1" placeholder="Придумайте ПИН">
        <input type="password" id="p2" placeholder="Повторите ПИН">
        <button onclick="doRegister()">Создать Сейф</button>
    </div>

    <!-- ЭКРАН ВХОДА -->
    <div class="card hidden" id="loginScreen">
        <h3>СЕЙФ ЗАБЛОКИРОВАН</h3>
        <input type="password" id="loginPin" placeholder="Введите ПИН">
        <button onclick="doLogin()">Открыть</button>
        <button style="background:transparent; color:#555; border:none; margin-top:10px;" onclick="localStorage.clear(); location.reload();">Удалить аккаунт</button>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div class="card hidden" id="app">
        <div style="text-align: left; font-size: 14px; margin-bottom: 10px;">
            👤 <span id="userNick"></span> | <span id="userId" style="color:var(--accent)"></span>
        </div>
        <p>💰 VOX: <span id="userBalance">100.00</span></p>
        <hr border="1" color="#1a1f3a" style="margin: 15px 0;">
        <input type="text" id="targetId" placeholder="ID получателя (VOX-...)">
        <textarea id="msgText" placeholder="Зашифрованное сообщение..." rows="3"></textarea>
        <button onclick="sendMsg()">Отправить Пакет</button>
        <div id="status" style="font-size:11px; margin-top:10px; color:var(--accent); min-height: 15px;"></div>
    </div>

    <!-- ОКНО С SEED -->
    <div id="seedModal" class="modal hidden">
        <div class="card">
            <h3 style="color: var(--accent);">⚠️ ЗАПИШИТЕ SEED!</h3>
            <p style="font-size: 12px; color: #888;">Это единственный способ восстановить доступ.</p>
            <div class="seed-box" id="seedOut"></div>
            <button onclick="finishReg()">Я ЗАПИСАЛ</button>
        </div>
    </div>

    <script>
        // ТВОЯ АКТУАЛЬНАЯ ССЫЛКА
        const MAYAK_URL = "https://script.google.com/macros/s/AKfycby9k2zI09dtL2454FvvansiCKqZ3kY-UFnYdWEK8bKWYBNxFAu49O9uPlsMB8a3e-fi/exec";
        let vault = null;

        function doRegister() {
            const nick = document.getElementById('nick').value;
            const p1 = document.getElementById('p1').value;
            const p2 = document.getElementById('p2').value;

            if (!nick || p1.length < 4) return alert("Заполните ник и ПИН (от 4 цифр)");
            if (p1 !== p2) return alert("ПИН-коды не совпадают!");

            // Автономная генерация 12 слов
            const words = ["alpha", "voxis", "node", "core", "matrix", "shield", "void", "proxy", "pixel", "storm", "cyber", "wave", "logic", "pulse", "data", "link", "zero", "guard", "flow", "apex", "base", "stable", "reach", "gear"];
            let seed = [];
            for(let i=0; i<12; i++) seed.push(words[Math.floor(Math.random() * words.length)]);
            const seedStr = seed.join(" ");
            
            // Создание уникального ID
            const id = "VOX-" + CryptoJS.SHA256(seedStr).toString().substring(0, 8).toUpperCase();

            // Сборка Сейфа
            const data = { nick, id, seed: seedStr };
            const encrypted = CryptoJS.AES.encrypt(JSON.stringify(data), p1).toString();
            
            localStorage.setItem('vox_vault', encrypted);
            vault = data;

            document.getElementById('seedOut').innerText = seedStr;
            document.getElementById('seedModal').classList.remove('hidden');
        }

        function finishReg() {
            document.getElementById('seedModal').classList.add('hidden');
            renderApp();
        }

        function doLogin() {
            const pin = document.getElementById('loginPin').value;
            const encrypted = localStorage.getItem('vox_vault');
            try {
                const bytes = CryptoJS.AES.decrypt(encrypted, pin);
                const decryptedStr = bytes.toString(CryptoJS.enc.Utf8);
                if (!decryptedStr) throw new Error();
                vault = JSON.parse(decryptedStr);
                renderApp();
            } catch(e) { 
                alert("НЕВЕРНЫЙ ПИН!"); 
            }
        }

        function renderApp() {
            document.getElementById('userNick').innerText = vault.nick;
            document.getElementById('userId').innerText = vault.id;
            document.getElementById('regScreen').classList.add('hidden');
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
        }

        async function sendMsg() {
            const to = document.getElementById('targetId').value;
            const txt = document.getElementById('msgText').value;
            if (!to || !txt) return alert("Заполните поля отправки");

            const status = document.getElementById('status');
            status.innerText = "📡 Шифрование и отправка...";
            
            try {
                // Прямой запрос в Google (Партизанский метод)
                await fetch(`${MAYAK_URL}?action=send&from=${vault.id}&to=${to}&text=${encodeURIComponent(txt)}`, { mode: 'no-cors' });
                status.innerText = "✅ ПАКЕТ ПРИНЯТ МАЯКОМ";
                document.getElementById('msgText').value = "";
            } catch(e) { 
                status.innerText = "❌ ОШИБКА СЕТИ"; 
            }
        }

        window.onload = () => {
            if(localStorage.getItem('vox_vault')) {
                document.getElementById('regScreen').classList.add('hidden');
                document.getElementById('loginScreen').classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
