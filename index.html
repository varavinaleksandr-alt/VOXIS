<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOXIS</title>
    <script src="https://cloudflare.com"></script>
    <style>
        body { background: #0a0e27; color: #00ffcc; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #11162e; border: 1px solid #00ffcc; border-radius: 15px; padding: 20px; max-width: 400px; margin: auto; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box; border-radius: 8px; border: 1px solid #00ffcc; background: #1a1f3a; color: #00ffcc; font-weight: bold; }
        button { background: #00ffcc; color: #0a0e27; cursor: pointer; }
        .hidden { display: none; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; }
        .seed-box { background: #000; padding: 15px; border: 1px solid #00ffcc; word-break: break-all; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>VOXIS</h1>
        <div id="regScreen">
            <input type="text" id="nick" placeholder="Никнейм">
            <input type="password" id="p1" placeholder="ПИН">
            <input type="password" id="p2" placeholder="Повтор ПИН">
            <button onclick="register()">СОЗДАТЬ СЕЙФ</button>
        </div>
        <div id="app" class="hidden">
            <p>ID: <span id="myId"></span></p>
            <p>Баланс: 100 VOX</p>
            <input type="text" id="to" placeholder="Кому ID">
            <button onclick="send()">ОТПРАВИТЬ ПАКЕТ</button>
        </div>
    </div>

    <div id="seedModal" class="modal hidden">
        <div class="card">
            <h3>ЗАПИШИТЕ SEED!</h3>
            <div id="seedOut" class="seed-box"></div>
            <button onclick="closeModal()">Я ЗАПИСАЛ</button>
        </div>
    </div>

    <script>
        const API = "https://google.com";

        function register() {
            const nick = document.getElementById('nick').value;
            const p1 = document.getElementById('p1').value;
            const p2 = document.getElementById('p2').value;

            if (p1 !== p2) return alert("ПИНы не совпали!");
            
            const seed = "voxis core " + Math.random().toString(36).substring(7) + " " + Math.random().toString(36).substring(7);
            const id = "VOX-" + CryptoJS.SHA256(seed).toString().substring(0, 8).toUpperCase();

            document.getElementById('seedOut').innerText = seed;
            document.getElementById('myId').innerText = id;
            
            localStorage.setItem('vox_vault', CryptoJS.AES.encrypt(seed, p1).toString());
            document.getElementById('seedModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('seedModal').classList.add('hidden');
            document.getElementById('regScreen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
        }

        async function send() {
            const to = document.getElementById('to').value;
            alert("Синхронизация с Маяком...");
            await fetch(API + "?action=send&token=" + to + "&message=PING", {mode: 'no-cors'});
            alert("ПАКЕТ В ОБЛАКЕ");
        }
    </script>
</body>
</html>
