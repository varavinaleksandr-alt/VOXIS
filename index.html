    <style>
        :root { --accent: #00ffcc; }
        body { background: #0a0e27; color: #e0e0e0; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #11162e; border: 1px solid var(--accent); border-radius: 15px; padding: 20px; max-width: 400px; margin: auto; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--accent); background: #1a1f3a; color: var(--accent); font-weight: bold; }
        button { background: var(--accent); color: #0a0e27; cursor: pointer; }
        .hidden { display: none !important; }
        .seed-box { background: #fff; color: #000; padding: 15px; border-radius: 8px; font-family: monospace; font-weight: bold; margin: 15px 0; border: 2px solid var(--accent); }
    </style>
</head>
<body>
    <div id="regScreen" class="card">
        <h1>VOXIS</h1>
        <input type="text" id="nick" placeholder="Никнейм">
        <input type="password" id="p1" placeholder="ПИН (от 4 цифр)">
        <input type="password" id="p2" placeholder="Повтор ПИН">
        <button onclick="register()">СОЗДАТЬ СЕЙФ</button>
    </div>

    <div id="app" class="card hidden">
        <h2>VOXIS АКТИВЕН</h2>
        <p>Узел: <span id="myNick"></span></p>
        <p>ID: <span id="myId" style="color:var(--accent)"></span></p>
        <button onclick="send()">ОТПРАВИТЬ ТЕСТ</button>
        <p id="log" style="font-size:10px"></p>
    </div>

    <div id="seedModal" class="modal hidden" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;justify-content:center;align-items:center;">
        <div class="card">
            <h3 style="color:var(--accent)">ЗАПИШИТЕ SEED!</h3>
            <div id="seedOut" class="seed-box"></div>
            <button onclick="closeModal()">Я ЗАПИСАЛ</button>
        </div>
    </div>

    <script>
        const API = "https://google.com";

        function register() {
            const n = document.getElementById('nick').value;
            const p1 = document.getElementById('p1').value;
            const p2 = document.getElementById('p2').value;

            if (p1 !== p2 || p1.length < 4) return alert("Проверьте ПИН!");

            // Простейшая генерация без внешних библиотек
            const seed = "voxis node " + Math.random().toString(36).substring(7) + " " + Math.random().toString(36).substring(7);
            const id = "VOX-" + Math.random().toString(36).substring(2, 8).toUpperCase();

            document.getElementById('seedOut').innerText = seed;
            document.getElementById('myNick').innerText = n;
            document.getElementById('myId').innerText = id;
            
            localStorage.setItem('vox_vault', seed); // Временно без AES для 100% запуска
            document.getElementById('seedModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('seedModal').style.display = 'none';
            document.getElementById('regScreen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
        }

        async function send() {
            document.getElementById('log').innerText = "Синхронизация...";
            await fetch(API + "?action=send&token=TEST&message=PING", {mode: 'no-cors'});
            document.getElementById('log').innerText = "ОТПРАВЛЕНО";
        }
    </script>
</body>
</html>
