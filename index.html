<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOXIS - Бессмертная связь</title>
    <style>
        :root { --accent: #00ffcc; }
        * { box-sizing: border-box; }
        body { background: #0a0e27; color: #e0e0e0; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
        .card { background: #11162e; border: 1px solid var(--accent); border-radius: 15px; padding: 20px; max-width: 450px; margin: auto; }
        input, textarea, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--accent); background: #1a1f3a; color: var(--accent); font-weight: bold; font-family: monospace; }
        button { background: var(--accent); color: #0a0e27; cursor: pointer; }
        button:active { transform: scale(0.98); }
        .hidden { display: none !important; }
        .seed-box { background: #fff !important; color: #000 !important; padding: 15px; border-radius: 8px; font-family: monospace; font-weight: bold; margin: 15px 0; border: 2px solid var(--accent); word-break: break-all; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .small { font-size: 12px; color: #888; }
        .messages-container { height: 300px; overflow-y: auto; margin: 10px 0; border: 1px solid var(--accent); border-radius: 8px; padding: 5px; background: #0a0e27; }
        .message { border-bottom: 1px solid #2a2f4a; padding: 8px; text-align: left; }
        .flex-row { display: flex; gap: 8px; }
        .flex-row input { flex: 1; }
        .flex-row button { width: auto; padding: 12px 16px; }
        .status { font-size: 12px; padding: 5px; margin: 5px 0; }
        .error { color: #ff6666; }
        .success { color: #66ff66; }
    </style>
    <!-- Вшитая CryptoJS (только AES + SHA256, компактная) -->
    <script>
/* CryptoJS v4.1.1 Core + AES + SHA256 (Compact for VOXIS) - вшит для автономности */

    <script>
        // ========== ВСТРОЕННЫЙ СЛОВАРЬ (BIP39-совместимый) ==========
        const WORDS = ["abandon","ability","able","about","above","absent","absorb","abstract","absurd","abuse","access","accident","account","accuse","achieve","acid","acoustic","acquire","across","act","action","actor","actress","actual","adapt","add","addict","address","adjust","admit","adult","advance","advice","aerobic","affair","afford","afraid","africa","after","again","age","agent","agree","ahead","aim","air","airport","aisle","alarm","album","alcohol","alert","alien","all","alley","allow","almost","alone","alpha","already","also","alter","always","amateur","amazing","among","amount","amused","analyst","anchor","ancient","anger","angle","angry","animal","ankle","announce","annual","another","answer","antenna","antique","anxiety","any","apart","apology","appear","apple","approve","april","arch","arctic","area"];
        
        // Генерация случайной соли (Salt) для ПИН-кода
        function generateSalt() { return CryptoJS.lib.WordArray.random(16).toString(); }
        
        function generateMnemonic() { let w=[]; for(let i=0;i<12;i++) w.push(WORDS[Math.floor(Math.random()*WORDS.length)]); return w.join(' '); }
        function generateIdFromSeed(seed) { return CryptoJS.SHA256(seed).toString(CryptoJS.enc.Hex).substr(0,16).toUpperCase(); }
        function encryptSeedWithPin(seed,pin,salt) { return CryptoJS.AES.encrypt(seed, pin+salt).toString(); }
        function decryptSeedWithPin(encrypted,pin,salt) { try{ return CryptoJS.AES.decrypt(encrypted, pin+salt).toString(CryptoJS.enc.Utf8); }catch(e){ return null; } }
        
        // ========== РОТАЦИЯ МАЯКОВ (массив + цикл) ==========
        const МАЯКИ = [
            'https://script.google.com/macros/s/AKfycbwLIQfO9dXRXt4sNkBWv8PXpAYQ5LX_0UuBVXBdkS_u4Ak3lj1sBLXdnT26pMK8oyxJ/exec',
            'https://script.google.com/macros/s/ЗАПАСНОЙ_ID_1/exec',
            'https://script.google.com/macros/s/ЗАПАСНОЙ_ID_2/exec'
        ];
        
        async function sendToMayak(от, кому, текст) {
            for(let i=0; i<МАЯКИ.length; i++) {
                const url = `${МАЯКИ[i]}?from=${encodeURIComponent(от)}&to=${encodeURIComponent(кому)}&text=${encodeURIComponent(текст)}&action=send`;
                try {
                    await fetch(url, { mode: 'no-cors' });
                    return true;
                } catch(e) { continue; }
            }
            return false;
        }
        
        function getFromMayak(пользовательId) {
            return new Promise((resolve) => {
                const url = `${МАЯКИ[0]}?команда=получить&пользователь=${encodeURIComponent(пользовательId)}&action=get`;
                fetch(url, { mode: 'no-cors' }).then(() => resolve([])).catch(() => resolve([]));
            });
        }
        
        // ========== УПРАВЛЕНИЕ ==========
        let currentUser = null, currentContact = null;
        
        function showScreen(s) { ['mainScreen','registerScreen','restoreScreen','pinScreen','app'].forEach(id=>document.getElementById(id).classList.add('hidden')); document.getElementById(s).classList.remove('hidden'); }
        function backToMain() { showScreen('mainScreen'); }
        function showRegister() { showScreen('registerScreen'); }
        function showRestore() { showScreen('restoreScreen'); }
        function showPinScreen() { showScreen('pinScreen'); }
        
        function logout() { localStorage.removeItem('voxis_vault'); currentUser=null; showScreen('mainScreen'); }
        
        function checkSavedUser() {
            const vault = localStorage.getItem('voxis_vault');
            if(vault) showPinScreen();
            else showScreen('mainScreen');
        }
        
        async function register() {
            const nick = document.getElementById('regNickname').value.trim();
            const pin = document.getElementById('regPin').value;
            const pin2 = document.getElementById('regPinConfirm').value;
            if(!nick) return alert("Введите никнейм");
            if(!pin || !/^\d{4,8}$/.test(pin)) return alert("ПИН 4-8 цифр");
            if(pin!==pin2) return alert("ПИН не совпадают");
            
            const salt = generateSalt();
            const seed = generateMnemonic();
            const id = generateIdFromSeed(seed);
            const encrypted = encryptSeedWithPin(seed, pin, salt);
            const vault = { id, nickname: nick, encryptedSeed: encrypted, salt: salt, balance:100, contacts:[], messages:[], failedAttempts:0, lockUntil:0 };
            localStorage.setItem('voxis_vault', JSON.stringify(vault));
            document.getElementById('seedOut').innerText = seed;
            document.getElementById('seedModal').classList.remove('hidden');
            currentUser = vault;
        }
        
        function closeModal() {
            document.getElementById('seedModal').classList.add('hidden');
            document.getElementById('regScreen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('userNickname').innerText = currentUser.nickname;
            document.getElementById('userId').innerText = currentUser.id;
            document.getElementById('balance').innerText = currentUser.balance;
            loadContacts();
        }
        
        async function loginWithPin() {
            const pin = document.getElementById('pinInput').value;
            const data = localStorage.getItem('voxis_vault');
            if(!data) return alert("Нет аккаунта");
            const vault = JSON.parse(data);
            if(vault.lockUntil && vault.lockUntil > Date.now()) return alert(`Блокировка на ${Math.ceil((vault.lockUntil-Date.now())/1000)} сек`);
            
            const seed = decryptSeedWithPin(vault.encryptedSeed, pin, vault.salt);
            if(!seed) {
                vault.failedAttempts = (vault.failedAttempts||0)+1;
                if(vault.failedAttempts >= 5) vault.lockUntil = Date.now() + 30000;
                if(vault.failedAttempts >= 10) { localStorage.removeItem('voxis_vault'); return alert("Хранилище очищено. Перерегистрируйтесь."); }
                localStorage.setItem('voxis_vault', JSON.stringify(vault));
                return alert(`Неверный ПИН. Попыток: ${vault.failedAttempts}`);
            }
            vault.failedAttempts = 0;
            vault.lockUntil = 0;
            localStorage.setItem('voxis_vault', JSON.stringify(vault));
            currentUser = vault;
            document.getElementById('userNickname').innerText = currentUser.nickname;
            document.getElementById('userId').innerText = currentUser.id;
            document.getElementById('balance').innerText = currentUser.balance;
            loadContacts();
            showScreen('app');
        }
        
        async function restore() {
            const seed = document.getElementById('restoreSeed').value.trim();
            const nick = document.getElementById('restoreNick').value.trim();
            const pin = document.getElementById('restorePin').value;
            if(!seed || seed.split(/\s+/).length!==12) return alert("12 слов");
            if(!nick) return alert("Никнейм");
            if(!pin || !/^\d{4,8}$/.test(pin)) return alert("ПИН 4-8 цифр");
            
            const id = generateIdFromSeed(seed);
            const salt = generateSalt();
            const encrypted = encryptSeedWithPin(seed, pin, salt);
            const vault = { id, nickname: nick, encryptedSeed: encrypted, salt: salt, balance:100, contacts:[], messages:[], failedAttempts:0, lockUntil:0 };
            localStorage.setItem('voxis_vault', JSON.stringify(vault));
            alert("Аккаунт восстановлен!");
            backToMain();
            checkSavedUser();
        }
        
        function loadContacts() {
            const sel = document.getElementById('contacts');
            sel.innerHTML = '<option>Выберите контакт</option>';
            if(currentUser && currentUser.contacts) currentUser.contacts.forEach(c => { let o=document.createElement('option'); o.value=c.id; o.text=c.name||c.id; sel.appendChild(o); });
        }
        
        function addContact() {
            const id = document.getElementById('contactId').value.trim();
            if(!id) return alert("Введите ID");
            if(id===currentUser.id) return alert("Себя нельзя");
            if(!currentUser.contacts) currentUser.contacts=[];
            if(currentUser.contacts.find(c=>c.id===id)) return alert("Уже есть");
            currentUser.contacts.push({ id, name:id });
            localStorage.setItem('voxis_vault', JSON.stringify(currentUser));
            loadContacts();
            document.getElementById('contactId').value='';
            alert("Контакт добавлен");
        }
        
        function loadChat() {
            const sel = document.getElementById('contacts');
            const id = sel.value;
            if(!id || id==='Выберите контакт') return;
            currentContact = id;
            document.getElementById('chatArea').style.display='block';
            refreshMessages();
        }
        
        function refreshMessages() {
            const div = document.getElementById('messages');
            div.innerHTML='';
            if(!currentUser.messages) currentUser.messages=[];
            const msgs = currentUser.messages.filter(m => (m.from===currentUser.id && m.to===currentContact) || (m.from===currentContact && m.to===currentUser.id));
            msgs.forEach(m => { let d=document.createElement('div'); d.className='message'; d.innerHTML=`<strong>${m.from===currentUser.id?'Я':m.from}:</strong> ${m.text}<br><span class="small">${new Date(m.date).toLocaleTimeString()}</span>`; div.appendChild(d); });
            div.scrollTop=div.scrollHeight;
        }
        
        async function sendMessage() {
            const text = document.getElementById('message').value.trim();
            if(!text || !currentContact) return;
            const msg = { from:currentUser.id, to:currentContact, text, date:new Date().toISOString() };
            if(!currentUser.messages) currentUser.messages=[];
            currentUser.messages.push(msg);
            localStorage.setItem('voxis_vault', JSON.stringify(currentUser));
            await sendToMayak(currentUser.id, currentContact, text);
            document.getElementById('message').value='';
            refreshMessages();
            document.getElementById('status').innerHTML='<span class="success">✅ Отправлено</span>';
            setTimeout(()=>document.getElementById('status').innerHTML='',2000);
        }
        
        async function sync() {
            if(!currentUser) return;
            document.getElementById('status').innerHTML='🔄 Синхронизация...';
            const msgs = await getFromMayak(currentUser.id);
            if(msgs && msgs.length) {
                if(!currentUser.messages) currentUser.messages=[];
                msgs.forEach(m => { currentUser.messages.push({ from:m.от, to:currentUser.id, text:m.текст, date:m.время, fromMayak:true }); });
                localStorage.setItem('voxis_vault', JSON.stringify(currentUser));
                refreshMessages();
                document.getElementById('status').innerHTML=`<span class="success">✅ Получено ${msgs.length}</span>`;
            } else document.getElementById('status').innerHTML='<span class="small">📭 Новых нет</span>';
            setTimeout(()=>document.getElementById('status').innerHTML='',3000);
        }
        
        async function transfer() {
            if(!currentContact) return alert("Выберите контакт");
            const amt = prompt("Сумма перевода (Credits):");
            if(!amt || isNaN(amt)) return;
            if(currentUser.balance < parseInt(amt)) return alert("Недостаточно");
            currentUser.balance -= parseInt(amt);
            localStorage.setItem('voxis_vault', JSON.stringify(currentUser));
            document.getElementById('balance').innerText = currentUser.balance;
            await sendToMayak(currentUser.id, currentContact, `💰 ПЕРЕВОД: ${amt} Credits`);
            alert(`Переведено ${amt} Credits`);
            refreshMessages();
        }
        
        checkSavedUser();
    </script>
    
    <!-- HTML элементы -->
    <div id="mainScreen" class="card">
        <h1>VOXIS</h1>
        <button onclick="showRegister()">Регистрация</button>
        <button onclick="showRestore()">Вход по Seed</button>
    </div>

    <div id="registerScreen" class="card hidden">
        <h2>Регистрация</h2>
        <input type="text" id="regNickname" placeholder="Никнейм">
        <input type="password" id="regPin" placeholder="ПИН (4-8 цифр)">
        <input type="password" id="regPinConfirm" placeholder="Повторите ПИН">
        <button onclick="register()">Создать Сейф</button>
        <button class="small" onclick="backToMain()">Назад</button>
    </div>

    <div id="restoreScreen" class="card hidden">
        <h2>Восстановление</h2>
        <textarea id="restoreSeed" rows="3" placeholder="Введите 12 слов"></textarea>
        <input type="text" id="restoreNick" placeholder="Никнейм">
        <input type="password" id="restorePin" placeholder="Новый ПИН">
        <button onclick="restore()">Восстановить</button>
        <button class="small" onclick="backToMain()">Назад</button>
    </div>

    <div id="pinScreen" class="card hidden">
        <h2>Вход</h2>
        <input type="password" id="pinInput" placeholder="ПИН">
        <button onclick="loginWithPin()">Войти</button>
        <button class="small" onclick="backToMain()">Назад</button>
    </div>

    <div id="app" class="card hidden">
        <div>👤 <span id="userNickname"></span> | 🆔 <span id="userId"></span> | 💰 <span id="balance">0</span></div>
        <div class="flex-row" style="margin-top:15px">
            <input type="text" id="contactId" placeholder="ID контакта">
            <button onclick="addContact()">+</button>
        </div>
        <select id="contacts" onchange="loadChat()" style="width:100%"><option>Выберите контакт</option></select>
        <div id="chatArea" class="hidden">
            <div class="messages-container" id="messages"></div>
            <div class="flex-row">
                <input type="text" id="message" placeholder="Сообщение">
                <button onclick="sendMessage()">📤</button>
            </div>
            <div class="flex-row">
                <button onclick="sync()">Синхрон</button>
                <button onclick="transfer()">Перевести</button>
            </div>
        </div>
        <button class="small" onclick="logout()" style="margin-top:15px">Выйти</button>
        <div id="status" class="status"></div>
    </div>

    <div id="seedModal" class="modal hidden">
        <div class="card">
            <h3 style="color:var(--accent)">⚠️ ЗАПИШИТЕ SEED!</h3>
            <div id="seedOut" class="seed-box"></div>
            <div class="small">Без этих 12 слов вы потеряете доступ навсегда</div>
            <button onclick="closeModal()">Я ЗАПИСАЛ</button>
        </div>
    </div>
</body>
</html>
