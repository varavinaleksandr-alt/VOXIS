<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOXIS - Stealth</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bip39@3.1.0/index.min.js"></script>
    <style>
        :root { --accent: #00ffcc; }
        body { background: #0a0e27; color: #e0e0e0; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #11162e; border: 1px solid var(--accent); border-radius: 15px; padding: 20px; max-width: 400px; margin: auto; }
        input, textarea, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--accent); background: #1a1f3a; color: var(--accent); font-weight: bold; font-family: monospace; }
        button { background: var(--accent); color: #0a0e27; cursor: pointer; }
        .hidden { display: none !important; }
        .seed-box { background: #fff; color: #000; padding: 15px; border-radius: 8px; font-family: monospace; font-weight: bold; margin: 15px 0; border: 2px solid var(--accent); word-break: break-all; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .small { font-size: 12px; color: #888; }
        .message { border-bottom: 1px solid #2a2f4a; padding: 8px; text-align: left; }
        .messages-container { height: 300px; overflow-y: auto; margin: 10px 0; border: 1px solid var(--accent); border-radius: 8px; padding: 5px; }
        .flex-row { display: flex; gap: 8px; }
        .flex-row input { flex: 1; }
        .flex-row button { width: auto; padding: 12px 16px; }
        .logout-btn { background: transparent; border-color: #ff6666; color: #ff6666; margin-top: 20px; }
    </style>
</head>
<body>
    <!-- Экран регистрации -->
    <div id="regScreen" class="card">
        <h1>VOXIS</h1>
        <input type="text" id="nick" placeholder="Никнейм">
        <input type="password" id="p1" placeholder="ПИН (4-8 цифр)">
        <input type="password" id="p2" placeholder="Повтор ПИН">
        <button onclick="register()">СОЗДАТЬ СЕЙФ</button>
        <button onclick="showRestore()" class="small" style="background:transparent; border-color:#666;">Вход по Seed</button>
    </div>

    <!-- Экран восстановления -->
    <div id="restoreScreen" class="card hidden">
        <h2>Восстановление</h2>
        <textarea id="seedInput" placeholder="Введите 12 слов" rows="3"></textarea>
        <input type="text" id="restoreNick" placeholder="Никнейм">
        <input type="password" id="restorePin" placeholder="Новый ПИН">
        <button onclick="restore()">Восстановить</button>
        <button onclick="backToReg()" class="small" style="background:transparent; border-color:#666;">Назад</button>
    </div>

    <!-- Экран входа по ПИН -->
    <div id="pinScreen" class="card hidden">
        <h2>Вход</h2>
        <input type="password" id="pinInput" placeholder="ПИН">
        <button onclick="loginWithPin()">Войти</button>
        <button onclick="backToReg()" class="small" style="background:transparent; border-color:#666;">Назад</button>
    </div>

    <!-- Основной интерфейс (Сейф) -->
    <div id="app" class="card hidden">
        <h2>🔒 СЕЙФ АКТИВЕН</h2>
        <p>👤 <span id="myNick"></span></p>
        <p>🆔 <span id="myId" style="color:var(--accent); word-break:break-all;"></span></p>
        <p>💰 <span id="balance">100</span> Credits</p>
        
        <hr style="border-color:var(--accent);">
        
        <h3>Контакты</h3>
        <div class="flex-row">
            <input type="text" id="contactId" placeholder="ID контакта">
            <button onclick="addContact()">+</button>
        </div>
        <select id="contacts" onchange="loadChat()" style="width:100%">
            <option>Выберите контакт</option>
        </select>
        
        <div id="chatArea" class="hidden">
            <h3>Чат</h3>
            <div class="messages-container" id="messages"></div>
            <div class="flex-row">
                <input type="text" id="message" placeholder="Сообщение">
                <button onclick="sendMessage()">📤</button>
            </div>
            <div class="flex-row">
                <button onclick="sync()" style="flex:1">СИНХРОН</button>
                <button onclick="transfer()" style="flex:1">💸 ПЕРЕВЕСТИ</button>
            </div>
        </div>
        
        <button onclick="logout()" class="logout-btn">ВЫЙТИ</button>
        <p id="log" style="font-size:10px; margin-top:10px;"></p>
    </div>

    <!-- Модальное окно для Seed -->
    <div id="seedModal" class="modal hidden">
        <div class="card">
            <h3 style="color:var(--accent)">⚠️ ЗАПИШИТЕ SEED!</h3>
            <div id="seedOut" class="seed-box"></div>
            <div class="small">Без этих 12 слов вы потеряете доступ навсегда</div>
            <button onclick="closeModal()">Я ЗАПИСАЛ</button>
        </div>
    </div>

    <script>
        // ========== НАСТРОЙКА ==========
        const МАЯК_URL = 'https://script.google.com/macros/s/AKfycbwLIQfO9dXRXt4sNkBWv8PXpAYQ5LX_0UuBVXBdkS_u4Ak3lj1sBLXdnT26pMK8oyxJ/exec';
        
        let currentUser = null;
        let currentContact = null;
        let pendingSeed = null;

        // ========== КРИПТОГРАФИЯ ==========
        function generateIdFromSeed(seed) {
            return CryptoJS.SHA256(seed).toString(CryptoJS.enc.Hex).substr(0, 16).toUpperCase();
        }

        function encryptSeedWithPin(seed, pin) {
            return CryptoJS.AES.encrypt(seed, pin).toString();
        }

        function decryptSeedWithPin(encryptedSeed, pin) {
            try {
                return CryptoJS.AES.decrypt(encryptedSeed, pin).toString(CryptoJS.enc.Utf8);
            } catch(e) {
                return null;
            }
        }

        // ========== API ЗАПРОСЫ К МАЯКУ ==========
        async function apiRequest(команда, данные = {}) {
            try {
                const response = await fetch(МАЯК_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ команда, ...данные })
                });
                return await response.json();
            } catch(e) {
                console.error(e);
                return { error: e.message };
            }
        }

        async function sendToMayak(от, кому, текст) {
            try {
                const response = await fetch(МАЯК_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ from: от, to: кому, text: текст })
                });
                return await response.json();
            } catch(e) {
                return { error: e.message };
            }
        }

        // ========== УПРАВЛЕНИЕ ЭКРАНАМИ ==========
        function showScreen(screenId) {
            document.getElementById('regScreen').classList.add('hidden');
            document.getElementById('restoreScreen').classList.add('hidden');
            document.getElementById('pinScreen').classList.add('hidden');
            document.getElementById('app').classList.add('hidden');
            document.getElementById(screenId).classList.remove('hidden');
        }

        function backToReg() {
            showScreen('regScreen');
        }

        function showRestore() {
            showScreen('restoreScreen');
        }

        // ========== РЕГИСТРАЦИЯ ==========
        async function register() {
            const nick = document.getElementById('nick').value.trim();
            const pin = document.getElementById('p1').value;
            const pin2 = document.getElementById('p2').value;

            if (!nick) return alert("Введите никнейм");
            if (!pin || !/^\d{4,8}$/.test(pin)) return alert("ПИН должен быть 4-8 цифр");
            if (pin !== pin2) return alert("ПИН и подтверждение не совпадают");

            const seed = bip39.generateMnemonic();
            const id = generateIdFromSeed(seed);
            const encryptedSeed = encryptSeedWithPin(seed, pin);

            const vault = {
                id: id,
                nickname: nick,
                encryptedSeed: encryptedSeed,
                balance: 100,
                contacts: [],
                messages: []
            };
            localStorage.setItem('voxis_vault', JSON.stringify(vault));
            
            pendingSeed = seed;
            document.getElementById('seedOut').innerText = seed;
            document.getElementById('seedModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('seedModal').classList.add('hidden');
            const vault = JSON.parse(localStorage.getItem('voxis_vault'));
            if (vault) {
                currentUser = vault;
                document.getElementById('myNick').innerText = currentUser.nickname;
                document.getElementById('myId').innerText = currentUser.id;
                document.getElementById('balance').innerText = currentUser.balance;
                loadContacts();
                showScreen('app');
            }
        }

        // ========== ВХОД ПО ПИН ==========
        async function loginWithPin() {
            const pin = document.getElementById('pinInput').value;
            const vault = JSON.parse(localStorage.getItem('voxis_vault'));
            
            if (!vault) return alert("Нет сохранённого аккаунта");
            
            const decryptedSeed = decryptSeedWithPin(vault.encryptedSeed, pin);
            if (!decryptedSeed) return alert("Неверный ПИН");
            
            const expectedId = generateIdFromSeed(decryptedSeed);
            if (expectedId !== vault.id) return alert("Ошибка верификации");
            
            currentUser = vault;
            document.getElementById('myNick').innerText = currentUser.nickname;
            document.getElementById('myId').innerText = currentUser.id;
            document.getElementById('balance').innerText = currentUser.balance;
            loadContacts();
            showScreen('app');
        }

        // ========== ВОССТАНОВЛЕНИЕ ПО SEED ==========
        async function restore() {
            const seed = document.getElementById('seedInput').value.trim();
            const nickname = document.getElementById('restoreNick').value.trim();
            const pin = document.getElementById('restorePin').value;
            
            if (!seed || seed.split(/\s+/).length !== 12) return alert("Введите 12 слов");
            if (!nickname) return alert("Введите никнейм");
            if (!pin || !/^\d{4,8}$/.test(pin)) return alert("ПИН должен быть 4-8 цифр");
            
            const id = generateIdFromSeed(seed);
            const encryptedSeed = encryptSeedWithPin(seed, pin);
            
            const vault = {
                id: id,
                nickname: nickname,
                encryptedSeed: encryptedSeed,
                balance: 100,
                contacts: [],
                messages: []
            };
            localStorage.setItem('voxis_vault', JSON.stringify(vault));
            
            alert("Аккаунт восстановлен!");
            backToReg();
            checkSavedUser();
        }

        // ========== КОНТАКТЫ ==========
        function loadContacts() {
            const select = document.getElementById('contacts');
            select.innerHTML = '<option>Выберите контакт</option>';
            if (currentUser && currentUser.contacts) {
                currentUser.contacts.forEach(c => {
                    const option = document.createElement('option');
                    option.value = c.id;
                    option.text = c.name || c.id;
                    select.appendChild(option);
                });
            }
        }

        async function addContact() {
            const contactId = document.getElementById('contactId').value.trim();
            if (!contactId) return alert("Введите ID контакта");
            if (contactId === currentUser.id) return alert("Нельзя добавить себя");
            
            if (!currentUser.contacts) currentUser.contacts = [];
            if (currentUser.contacts.find(c => c.id === contactId)) {
                return alert("Контакт уже есть");
            }
            
            currentUser.contacts.push({ id: contactId, name: contactId });
            localStorage.setItem('voxis_vault', JSON.stringify(currentUser));
            loadContacts();
            document.getElementById('contactId').value = '';
            alert("Контакт добавлен");
        }

        // ========== СООБЩЕНИЯ ==========
        function loadChat() {
            const select = document.getElementById('contacts');
            const contactId = select.value;
            if (!contactId || contactId === 'Выберите контакт') return;
            currentContact = contactId;
            document.getElementById('chatArea').classList.remove('hidden');
            refreshMessages();
        }

        function refreshMessages() {
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = '';
            if (!currentUser.messages) currentUser.messages = [];
            
            const chatMessages = currentUser.messages.filter(m => 
                (m.from === currentUser.id && m.to === currentContact) || 
                (m.from === currentContact && m.to === currentUser.id)
            );
            
            chatMessages.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'message';
                const sender = msg.from === currentUser.id ? 'Я' : msg.from;
                div.innerHTML = `<strong>${sender}:</strong> ${msg.text}<br><span class="small">${new Date(msg.date).toLocaleTimeString()}</span>`;
                messagesDiv.appendChild(div);
            });
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendMessage() {
            const text = document.getElementById('message').value.trim();
            if (!text) return;
            if (!currentContact) return alert("Выберите контакт");
            
            const message = {
                from: currentUser.id,
                to: currentContact,
                text: text,
                date: new Date().toISOString()
            };
            
            if (!currentUser.messages) currentUser.messages = [];
            currentUser.messages.push(message);
            localStorage.setItem('voxis_vault', JSON.stringify(currentUser));
            
            // Отправляем в Маяк
            await sendToMayak(currentUser.id, currentContact, text);
            
            document.getElementById('message').value = '';
            refreshMessages();
            document.getElementById('log').innerHTML = '<span class="small">✅ Отправлено в Маяк</span>';
            setTimeout(() => document.getElementById('log').innerHTML = '', 2000);
        }

        async function sync() {
            if (!currentUser) return;
            document.getElementById('log').innerHTML = '🔄 Синхронизация...';
            
            const result = await apiRequest('получить', { пользователь: currentUser.id });
            
            if (result && !result.error && Array.isArray(result)) {
                if (result.length > 0) {
                    if (!currentUser.messages) currentUser.messages = [];
                    result.forEach(msg => {
                        currentUser.messages.push({
                            from: msg.от,
                            to: currentUser.id,
                            text: msg.текст,
                            date: msg.время,
                            fromMayak: true
                        });
                    });
                    localStorage.setItem('voxis_vault', JSON.stringify(currentUser));
                    refreshMessages();
                    document.getElementById('log').innerHTML = `<span class="small">✅ Получено ${result.length} сообщений</span>`;
                } else {
                    document.getElementById('log').innerHTML = '<span class="small">📭 Новых сообщений нет</span>';
                }
            } else {
                document.getElementById('log').innerHTML = '<span class="small">❌ Ошибка синхронизации</span>';
            }
            setTimeout(() => document.getElementById('log').innerHTML = '', 3000);
        }

        // ========== ПЕРЕВОД CREDITS ==========
        async function transfer() {
            if (!currentContact) return alert("Выберите контакт");
            const amount = prompt("Сумма перевода (Credits):");
            if (!amount || isNaN(amount)) return;
            if (currentUser.balance < parseInt(amount)) return alert("Недостаточно Credits");
            
            currentUser.balance -= parseInt(amount);
            localStorage.setItem('voxis_vault', JSON.stringify(currentUser));
            document.getElementById('balance').innerText = currentUser.balance;
            
            // Отправляем уведомление о переводе через Маяк
            await sendToMayak(currentUser.id, currentContact, `💰 ПЕРЕВОД: ${amount} Credits`);
            
            alert(`Переведено ${amount} Credits`);
            refreshMessages();
        }

        // ========== ВЫХОД ==========
        function logout() {
            localStorage.removeItem('voxis_vault');
            currentUser = null;
            currentContact = null;
            showScreen('regScreen');
        }

        // ========== ПРОВЕРКА СОХРАНЁННОГО ПОЛЬЗОВАТЕЛЯ ==========
        function checkSavedUser() {
            const vault = localStorage.getItem('voxis_vault');
            if (vault) {
                currentUser = JSON.parse(vault);
                showScreen('pinScreen');
            } else {
                showScreen('regScreen');
            }
        }

        // Запуск
        checkSavedUser();
    </script>
</body>
</html>
