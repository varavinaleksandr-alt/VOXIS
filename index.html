<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GILDIA v0.1</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding-top: 50px; }
        button { background: #0f0; color: #000; border: none; padding: 20px; font-weight: bold; border-radius: 10px; cursor: pointer; }
        #out { margin-top: 30px; font-size: 18px; color: #00ffcc; border-top: 1px solid #333; padding-top: 20px; }
    </style>
</head>
<body>
    <h1>GILDIA NODE</h1>
    <button onclick="check()">ПРОВЕРИТЬ МАЯК</button>
    <div id="out">СТАТУС: ОЖИДАНИЕ</div>

    <script>
        // ВАЖНО: Вставь сюда тот самый URL, который выдал "КОД 777"
        const SERVER_URL = "https://script.google.com/macros/s/AKfycbwLIQfO9dXRXt4sNkBWv8PXpAYQ5LX_0UuBVXBdkS_u4Ak3lj1sBLXdnT26pMK8oyxJ/exec";

        async function check() {
            const out = document.getElementById('out');
            out.innerText = "СКАНИРОВАНИЕ...";
            
            try {
                // Мы просто идем по ссылке и берем текст
                const response = await fetch(SERVER_URL);
                const text = await response.text(); 
                out.innerText = "ПОЛУЧЕНО: " + text;
            } catch (err) {
                out.innerText = "ОШИБКА СВЯЗИ";
            }
        }
    </script>
</body>
</html>
