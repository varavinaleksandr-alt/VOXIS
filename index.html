<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GILDIA Mobile</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .app-container { width: 100%; max-width: 400px; height: 100%; background: #1a1a1a; border-radius: 0; box-shadow: 0 0 20px rgba(0,0,0,0.5); display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .header { border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 20px; }
        h1 { color: #00ffcc; font-size: 24px; letter-spacing: 2px; margin: 0; }
        .status-dot { height: 10px; width: 10px; background-color: #00ffcc; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 10px #00ffcc; }
        .balance-card { background: #252525; padding: 15px; border-radius: 12px; margin-bottom: 20px; border-left: 4px solid #00ffcc; }
        .label { font-size: 12px; color: #888; text-transform: uppercase; }
        .value { font-size: 20px; font-weight: bold; margin-top: 5px; }
        .screen { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        button { background: transparent; border: 1px solid #00ffcc; color: #00ffcc; padding: 18px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        button:active { background: rgba(0, 255, 204, 0.1); transform: scale(0.98); }
        #log { margin-top: 20px; font-size: 13px; color: #666; font-family: monospace; min-height: 40px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>GILDIA <span style="font-size: 10px; vertical-align: middle; color: #444;">V0.1 ALPHA</span></h1>
            <div style="margin-top: 10px; font-size: 12px;"><span class="status-dot"></span> СЕТЬ: ЗАЩИЩЕНА (STEALTH)</div>
        </div>

        <div class="screen">
            <div class="balance-card">
                <div class="label">Твой баланс</div>
                <div class="value">100 GIL</div>
            </div>
            <div class="balance-card" style="border-left-color: #555;">
                <div class="label">Идентификатор (Founders)</div>
                <div class="value" style="font-size: 16px;">F1_ZARYA</div>
            </div>
            
            <button onclick="checkBeacon()">Проверить Маяк</button>
            <div id="log">Система готова. Ожидание команд...</div>
        </div>
    </div>

    <script>
        // ВСТАВЬ СЮДА СВОЙ URL ИЗ GOOGLE (который заканчивается на /exec)
        const SERVER_URL = "https://script.google.com/macros/s/AKfycbxDhuGuaVKwcr6V4N3Bn3U7VyedFhYbY1UYuNTb2YV4nDrv_Kaa07UvBSkjHd30mCF9/exec";

        async function checkBeacon() {
            const logElement = document.getElementById('log');
            logElement.innerText = "> Подключение к узлу GILDIA...";
            
            try {
                const response = await fetch(SERVER_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Важно для обхода ограничений браузера на MVP
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'check', token: 'F1_ZARYA' })
                });
                
                // На MVP стадии с Google Scripts 'no-cors' не дает прочитать ответ, 
                // но соединение ПРОВЕРЯЕТСЯ.
                logElement.style.color = "#00ffcc";
                logElement.innerText = "> УСПЕХ: Сигнал принят. Обновлений нет.";
                
            } catch (err) {
                logElement.style.color = "#ff4444";
                logElement.innerText = "> ОШИБКА: Узел заблокирован.";
            }
        }
    </script>
</body>
</html>
