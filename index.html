<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOXIS - Stealth Messenger</title>
    <!-- Библиотека шифрования -->
    <script src="https://cloudflare.com"></script>
    <style>
        :root { --bg: #0a0e27; --card: #11162e; --accent: #00ffcc; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .card { background: var(--card); border: 1px solid var(--accent); border-radius: 15px; padding: 25px; max-width: 400px; margin: 20px auto; box-shadow: 0 0 20px rgba(0,255,204,0.2); }
        input, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--accent); box-sizing: border-box; font-size: 16px; outline: none; }
        input { background: #1a1f3a; color: var(--accent); }
        button { background: var(--accent); color: #0a0e27; font-weight: bold; cursor: pointer; border: none; text-transform: uppercase; }
        button:active { opacity: 0.7; transform: scale(0.98); }
        .hidden { display: none !important; }
        
        /* КОНТРАСТНЫЙ БЛОК ДЛЯ SEED */
        .seed-box { 
            background: #ffffff !important; 
            color: #000000 !important; 
            padding: 20px; 
            border-radius: 10px; 
            font-family: monospace; 
            font-weight: bold; 
            font-size: 16px; 
            word-break: break-all; 
            margin: 20px 0; 
            border: 3px solid var(--accent);
            display: block !important;
        }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        #log { font-size: 10px; color: #555; margin-top: 10px; font-family: monospace; }
    </style>
</head>
<body>

    <!-- ЭКРАН РЕГИСТРАЦИИ -->
    <div id="regScreen" class="card">
        <h1>VOXIS</h1>
        <p style="font-size: 11px; letter-spacing: 2px; color: #555;">SECURITY NODE ALPHA</p>
        <input type="text" id="nick" placeholder="Введите Никнейм">
        <input type="password" id="p1" placeholder="Придумайте ПИН">
        <input type="password" id="p2" placeholder="Повторите ПИН">
        <button id="regBtn" onclick="register()">Создать Сейф</button>
    </div>

    <!-- ЭКРАН ПРИЛОЖЕНИЯ -->
    <div id="app" class="card hidden">
        <h2 style="color: var(--accent); margin-top: 0;">VOXIS АКТИВЕН</h2>
        <div style="text-align: left; font-size: 14px; background: #0a0e27; padding: 15px; border-radius: 10px;">
            <p>👤 УЗЕЛ: <span id="myNick" style="color: #fff;"></span></p>
            <p>🆔 ID: <span id="myId" style="color: var(--accent);"></span></p>
            <p>💰 БАЛАНС: 100.00 VOX</p>
        </div>
        <input type="text" id="to" placeholder="ID получателя">
        <button onclick="send()">Отправить Пакет</button>
        <div id="log">ОЖИДАНИЕ СИГНАЛА...</div>
    </div>

    <!-- МОДАЛКА SEED -->
    <div id="seedModal" class="modal hidden">
        <div class="card" style="max-width: 90%;">
            <h3 style="color: var(--accent); margin-top: 0;">⚠️ ЗАПИШИТЕ SEED!</h3>
            <p style="font-size: 12px; color: #bbb;">Черный текст на белом фоне ниже — ваши 12 слов.</p>
            <div id="seedOut" class="seed-box"></div>
            <button onclick="closeModal()">Я ЗАПИСАЛ (ВХОД)</button>
        </div>
    </div>

    <script>
        // Ссылка на твой Google Script (Маяк)
        const API = "https://google.com";

        function register() {
            // Проверка библиотеки
            if (typeof CryptoJS === "undefined") {
                alert("Ошибка: Библиотека CryptoJS не загружена. Проверьте интернет.");
                return;
            }

            const nick = document.getElementById('nick').value.trim();
            const p1 = document.getElementById('p1').value;
            const p2 = document.getElementById('p2').value;

            // Валидация
            if (!nick || !p1 || !p2) {
                alert("Заполните все поля!");
                return;
            }
            if (p1 !== p2) {
                alert("ПИН-коды не совпадают!");
                return;
            }
            if (p1.length < 4) {
                alert("ПИН должен быть от 4 символов!");
                return;
            }

            try {
                // Генерация фразы
                const wordsList = ["vox", "node", "alpha", "stealth", "core", "shield", "matrix", "crypto", "ultra", "safe", "void", "proxy", "pixel", "storm", "cyber", "wave"];
                let seedArr = [];
                for(let i=0; i<12; i++) {
                    seedArr.push(wordsList[Math.floor(Math.random() * wordsList.length)]);
                }
                const seedString = seedArr.join(" ");
                
                // Генерация ID
                const id = "VOX-" + CryptoJS.SHA256(seedString).toString().substring(0, 8).toUpperCase();

                // Вывод данных
                document.getElementById('seedOut').innerText = seedString;
                document.getElementById('myNick').innerText = nick;
                document.getElementById('myId').innerText = id;
                
                // Шифрование для LocalStorage
                const vault = { nick: nick, id: id, seed: seedString };
                const encrypted = CryptoJS.AES.encrypt(JSON.stringify(vault), p1).toString();
                localStorage.setItem('vox_vault', encrypted);

                // Показ модалки
                document.getElementById('seedModal').classList.remove('hidden');

            } catch (err) {
                alert("Ошибка: " + err.message);
            }
        }

        function closeModal() {
            document.getElementById('seedModal').classList.add('hidden');
            document.getElementById('regScreen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
        }

        async function send() {
            const to = document.getElementById('to').value.trim();
            const log = document.getElementById('log');
            if(!to) return alert("Введите ID получателя");
            
            log.innerText = "> ПОДКЛЮЧЕНИЕ К МАЯКУ...";
            try {
                const myId = document.getElementById('myId').innerText;
                await fetch(API + "?action=send&token=" + to + "&message=SIGNAL_FROM_" + myId, {mode: 'no-cors'});
                log.innerText = "> ПАКЕТ УСПЕШНО ОТПРАВЛЕН.";
            } catch (e) {
                log.innerText = "> ОШИБКА СВЯЗИ.";
            }
        }

        // Чистка старых данных при загрузке, чтобы не мешали тесту
        // localStorage.removeItem('vox_vault'); 
    </script>
</body>
</html>
